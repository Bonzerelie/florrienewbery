        }

            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--primary);
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .controls {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .search-bar {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .controls-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .clear-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .clear-btn:hover {
            background: #c0392b;
        }

        .checkbox-list {
            max-height: 70vh;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            padding: 5px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .checkbox-item:hover {
            background: #f0f0f0;
        }

        .checkbox-item input {
            margin-right: 10px;
            transform: scale(1.2);
            cursor: pointer;
        }

        .checkbox-item label {
            cursor: pointer;
            font-size: 15px;
            width: 100%;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .rider-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .rider-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .rider-name {
            margin: 0;
            font-size: 24px;
            color: var(--primary);
        }

        .rider-meta {
            font-size: 14px;
            color: #666;
            background: #eef2f5;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .data-label {
            font-weight: bold;
        }

        .media-mentions {
            font-style: italic;
            color: #555;
            margin-bottom: 15px;
            background: #fdfdfd;
            padding: 10px;
            border-left: 3px solid #f39c12;
        }

        ul.results-list {
            margin: 0;
            padding-left: 20px;
        }

        ul.results-list li {
            margin-bottom: 5px;
            line-height: 1.4;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #777;
            font-size: 18px;
            background: var(--card-bg);
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .controls {
                position: static;
            }
        }

        function renderCheckboxes() {
            checkboxList.innerHTML = '';
            const searchTerm = searchInput.value.toLowerCase();
            
            ridersData.forEach(rider => {
                if (rider.name.toLowerCase().includes(searchTerm)) {
                    const div = document.createElement('div');
                    div.className = 'checkbox-item';
                    
                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.id = `rider-${rider.id}`;
                    input.value = rider.id;
                    input.checked = selectedRiders.has(rider.id);
                    
                    input.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            selectedRiders.add(rider.id);
                        } else {
                            selectedRiders.delete(rider.id);
                        }
                        renderResults();
                    });

                    const label = document.createElement('label');
                    label.htmlFor = `rider-${rider.id}`;
                    label.textContent = `${rider.id}. ${rider.name}`;

                    div.appendChild(input);
                    div.appendChild(label);
                    checkboxList.appendChild(div);
                }
            });
        }

        function renderResults() {
            resultsContainer.innerHTML = '';
            
            if (selectedRiders.size === 0) {
                resultsContainer.innerHTML = '<div class="empty-state">Select riders from the menu or search by name to view their profiles.</div>';
                return;
            }

            // Convert set to array and sort numerically by ID
            const sortedIds = Array.from(selectedRiders).sort((a, b) => a - b);

            sortedIds.forEach(id => {
                const rider = ridersData.find(r => r.id === id);
                if (rider) {
                    const card = document.createElement('div');
                    card.className = 'rider-card';
                    
                    let resultsHTML = '<ul class="results-list">';
                    rider.results.forEach(result => {
                        resultsHTML += `<li>${result}</li>`;
                    });
                    resultsHTML += '</ul>';

                    card.innerHTML = `
                        <div class="rider-header">
                            <h2 class="rider-name">#${rider.id} - ${rider.name}</h2>
                            <span class="rider-meta">${rider.team}</span>
                        </div>
                        <div class="data-grid">
                            <div><span class="data-label">Age/Cat:</span> ${rider.age}</div>
                            <div><span class="data-label">License:</span> ${rider.category}</div>
                        </div>
                        <div class="media-mentions">
                            <strong>Media:</strong> ${rider.media}
                        </div>
                        <div>
                            <span class="data-label">Recent Highlights:</span>
                            ${resultsHTML}
                        </div>
                    `;
                    resultsContainer.appendChild(card);
                }
            });
        }

        searchInput.addEventListener('input', renderCheckboxes);

        clearBtn.addEventListener('click', () => {
            selectedRiders.clear();
            renderCheckboxes();
            renderResults();
        });

        // Initial render
        renderCheckboxes();
    </script>
</body>
</html>
